<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Odyssey Supabase Smoke Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#e5e7eb;font-family:Inter,system-ui,sans-serif;padding:18px}
main{width:min(560px,100%);background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:24px;box-shadow:0 30px 90px rgba(0,0,0,.35)}
h1{margin:0 0 8px;font-family:Georgia,serif;font-size:34px;color:#fff}
p{color:#aab4c5;line-height:1.55}
label{display:block;margin:13px 0 6px;font-size:12px;font-weight:900;color:#fff}
input,select{width:100%;height:44px;border:1px solid #334155;border-radius:12px;background:#0b1220;color:#fff;padding:0 12px;font:inherit}
button{height:44px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:900;padding:0 14px;margin:14px 8px 0 0;cursor:pointer}
button.secondary{background:#334155}
pre{white-space:pre-wrap;word-break:break-word;background:#0b1220;border:1px solid #334155;border-radius:14px;padding:12px;color:#cbd5e1;min-height:100px}
</style>
</head>
<body>
<main>
  <h1>Supabase Smoke Test</h1>
  <p>This page bypasses Odyssey's auth UI and tests Supabase directly. Use a new test email.</p>
  <label>Supabase URL</label>
  <input id="url" placeholder="https://your-project.supabase.co">
  <label>Anon public key</label>
  <input id="key" placeholder="eyJhbGciOi...">
  <label>Email</label>
  <input id="email" type="email" placeholder="test@example.com">
  <label>Password</label>
  <input id="password" type="password" value="TestPassword123!">
  <label>Role</label>
  <select id="role"><option>student</option><option>instructor</option><option>institution</option></select>
  <button onclick="runSignup()">Test sign up</button>
  <button onclick="runLogin()" class="secondary">Test login</button>
  <button onclick="checkSession()" class="secondary">Check session</button>
  <pre id="out">Ready.</pre>
</main>
<script>
const out=document.getElementById('out');
function log(value){out.textContent=typeof value==='string'?value:JSON.stringify(value,null,2)}
function client(){
  const url=document.getElementById('url').value.trim();
  const key=document.getElementById('key').value.trim();
  if(!url||!key) throw new Error('Paste Supabase URL and anon public key first.');
  return supabase.createClient(url,key,{auth:{persistSession:true,autoRefreshToken:true}});
}
async function runSignup(){
  try{
    const sb=client();
    const {data,error}=await sb.auth.signUp({
      email:email.value.trim(),
      password:password.value,
      options:{data:{role:role.value,full_name:'Smoke Test User'}}
    });
    if(error) throw error;
    log({ok:true,message:data.session?'Signed up and session created.':'Signed up. Email confirmation may be required before login.',user:data.user&&{id:data.user.id,email:data.user.email,confirmed_at:data.user.confirmed_at},session:!!data.session});
  }catch(error){log({ok:false,error:error.message||String(error)})}
}
async function runLogin(){
  try{
    const sb=client();
    const {data,error}=await sb.auth.signInWithPassword({email:email.value.trim(),password:password.value});
    if(error) throw error;
    log({ok:true,user:data.user&&{id:data.user.id,email:data.user.email},session:!!data.session});
  }catch(error){log({ok:false,error:error.message||String(error)})}
}
async function checkSession(){
  try{
    const sb=client();
    const {data,error}=await sb.auth.getSession();
    if(error) throw error;
    log({ok:true,session:!!data.session,user:data.session?.user?.email||null});
  }catch(error){log({ok:false,error:error.message||String(error)})}
}
</script>
</body>
</html>
